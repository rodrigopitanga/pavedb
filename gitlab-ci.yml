stages:
  - test
  - benchmark
  - security
  - release

image: python:3.11

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  SAST_STAGE: security
  SECRET_DETECTION_STAGE: security
  SECRET_DETECTION_ENABLED: "true"

cache:
  paths:
    - .cache/pip

pytest:
  stage: test
  script:
    - python -m pip install --upgrade pip -q
    - pip install -r requirements-cpu.txt -q
    - pip install ".[test]" -q
    - pytest -q
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - junit.xml
      - .pytest_cache
    expire_in: 1 week

bench:
  stage: benchmark
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq curl git make
  script:
    - >-
      LAT_SLO_P99_MS=${LAT_SLO_P99_MS:-2000}
      STR_MAX_ERROR_PCT=${STR_MAX_ERROR_PCT:-1}
      BENCH_FORCE_EPHEMERAL=1
      BENCH_SAVE=1
      LAT_LENGTH=${LAT_LENGTH:-200}
      LAT_CONCUR=${LAT_CONCUR:-8}
      STR_LENGTH=${STR_LENGTH:-30}
      STR_CONCUR=${STR_CONCUR:-4}
      USE_CPU=1
      make benchmark
  artifacts:
    when: always
    paths:
      - benchmarks/results/
    expire_in: 4 weeks
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  allow_failure: false

# PyPI publish for final releases only (vX.Y.Z)
publish-pypi:
  stage: release
  script:
    - python -m pip install --upgrade build twine
    - python -m build
    - test -n "${PYPI_TOKEN:-}" || { echo "PYPI_TOKEN is missing"; exit 1; }
    - export TWINE_USERNAME="__token__"
    - export TWINE_PASSWORD="${PYPI_TOKEN}"
    - twine upload dist/*
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d{1,4}\.\d{1,4}\.\d{1,4}(\.\d{1,4})?$/'

# GitLab PyPI: all versioned tags (final, rc, alpha, beta, etc.)
publish-gitlab-pypi:
  stage: release
  script:
    - python -m pip install --upgrade build twine
    - python -m build
    - |
      test -n "${CI_DEPLOY_USER:-}" || { echo "CI_DEPLOY_USER is missing"; exit 1; }
      test -n "${CI_DEPLOY_PASSWORD:-}" || { echo "CI_DEPLOY_PASSWORD is missing"; exit 1; }
    - twine upload --repository-url "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/pypi" dist/* -u "$CI_DEPLOY_USER" -p "$CI_DEPLOY_PASSWORD"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d{1,4}\.\d{1,4}\.\d{1,4}\S{0,16}$/'

# Test PyPI: release candidates only (vX.Y.Zrc0-rc999)
publish-testpypi:
  stage: release
  script:
    - python -m pip install --upgrade build twine
    - python -m build
    - test -n "${TEST_PYPI_TOKEN:-}" || { echo "TEST_PYPI_TOKEN is missing"; exit 1; }
    - export TWINE_USERNAME="__token__"
    - export TWINE_PASSWORD="${TEST_PYPI_TOKEN}"
    - twine upload --repository-url "https://test.pypi.org/legacy/" dist/*
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d{1,4}\.\d{1,4}\.\d{1,4}rc\d{1,3}$/'

# Docker: release candidates (CPU only)
publish-docker-rc:
  stage: release
  image: docker:24.0.9
  services:
    - docker:24.0.9-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - export IMAGE_BASE="$CI_REGISTRY_IMAGE/patchvec"
    - export IMAGE_TAG="$VERSION-cpu"
    - export LATEST_TAG="latest-cpu"
    - export BUILD_ID="${CI_PIPELINE_ID:-0}-${CI_COMMIT_SHORT_SHA:-dev}-cpu"
    - docker build --progress=plain --build-arg USE_CPU=1 --build-arg BUILD_ID="$BUILD_ID" -t "$IMAGE_BASE:$IMAGE_TAG" -f Dockerfile .
    - docker push "$IMAGE_BASE:$IMAGE_TAG"
    - docker tag "$IMAGE_BASE:$IMAGE_TAG" "$IMAGE_BASE:$LATEST_TAG"
    - docker push "$IMAGE_BASE:$LATEST_TAG"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d{1,4}\.\d{1,4}\.\d{1,4}rc\d{1,3}$/'

# Docker: final releases only (CPU + GPU)
publish-docker:
  stage: release
  image: docker:24.0.9
  services:
    - docker:24.0.9-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - export IMAGE_BASE="$CI_REGISTRY_IMAGE/patchvec"
    - export BUILD_ID_GPU="${CI_PIPELINE_ID:-0}-${CI_COMMIT_SHORT_SHA:-dev}-gpu"
    - export BUILD_ID_CPU="${CI_PIPELINE_ID:-0}-${CI_COMMIT_SHORT_SHA:-dev}-cpu"
    - docker build --progress=plain --build-arg USE_CPU=0 --build-arg BUILD_ID="$BUILD_ID_GPU" -t "$IMAGE_BASE:$VERSION-gpu" -f Dockerfile .
    - docker push "$IMAGE_BASE:$VERSION-gpu"
    - docker tag "$IMAGE_BASE:$VERSION-gpu" "$IMAGE_BASE:latest-gpu"
    - docker push "$IMAGE_BASE:latest-gpu"
    - docker build --progress=plain --build-arg USE_CPU=1 --build-arg BUILD_ID="$BUILD_ID_CPU" -t "$IMAGE_BASE:$VERSION-cpu" -f Dockerfile .
    - docker push "$IMAGE_BASE:$VERSION-cpu"
    - docker tag "$IMAGE_BASE:$VERSION-cpu" "$IMAGE_BASE:latest-cpu"
    - docker push "$IMAGE_BASE:latest-cpu"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d{1,4}\.\d{1,4}\.\d{1,4}(\.\d{1,4})?$/'

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
